<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project CArch</title>
    <style>
        body {
            background-color: #0d1117;
            color: #e0e5ea;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            padding-top: 60px;
            margin: 0;
        }

        .main-container {
            width: 90%;
            max-width: 1000px;
            text-align: left;
        }

        .header-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        h1 {
            color: #FFFFFF;
            font-size: 49px;
            font-weight: 700;
            margin: 0;
        }

        .github-btn {
            background-color: #21262d;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s; 
            text-decoration: none;
        }

        .github-btn:hover {
            background-color: #30363d;
            border-color: #8b949e;
        }

        p {
            color: #919596;
            font-size: 21px;
            line-height: 1.6;
            margin: 0;
            margin-bottom: 40px;
            max-width: 970px;
        }

        .mac-window {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .title-bar {
            background-color: #21262d;
            padding: 12px 16px;
            display: flex;
            align-items: center;
        }

        .dots {
            display: flex;
            gap: 8px;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .red { background-color: #ff5f56; }
        .yellow { background-color: #ffbd2e; }
        .green { background-color: #27c93f; }

        .file-name {
            flex-grow: 1;
            text-align: center;
            color: #8b949e;
            font-size: 14px;
            font-family: monospace;
            padding-right: 52px;
        }

        .code-area {
            padding: 24px;
            font-family: "Consolas", "Monaco", monospace;
            font-size: 18px;
        }

        pre { margin: 0; }

        .func { color: #dcdcaa; }
        .string { color: #ce9178; }

        .terminal {
            border-top: 1px solid #30363d;
            padding: 12px 20px;
            font-family: monospace;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .prompt {
            color: #8b949e;
        }

        #commandInput {
            background: transparent;
            border: none;
            outline: none;
            color: #e0e5ea;
            font-family: monospace;
            font-size: 16px;
            width: 100%;
        }

        .error {
            color: #ff4c4c;
            font-family: monospace;
            font-size: 14px;
			margin-top: 8px;
        }

    </style>
</head>
<body>

    <div class="main-container">
        
        <div class="header-area">
            <h1>Project CArch</h1>
            
            <a href="https://github.com/civic1991t-arch" class="github-btn" target="_blank"> 
                <svg height="24" width="24" viewBox="0 0 16 16" fill="white">
                    <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-3.64-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path>
                </svg>
            </a>
        </div>

        <p>
            Project CArch is a one-person indie studio based in Ireland. 
            I develop games, tools, and creative projects, sharing them freely 
            to inspire, entertain, and experiment with new ideas.
        </p>

        <div class="mac-window">
            <div class="title-bar">
                <div class="dots">
                    <span class="dot red"></span>
                    <span class="dot yellow"></span>
                    <span class="dot green"></span>
                </div>
                <div class="file-name">main.py — ProjectCArch</div>
            </div>

            <div class="code-area">
                <pre><code><span class="func">print</span>(<span class="string">"hello world"</span>)</code></pre>
            </div>

            <div class="terminal" id="terminal">
                <div class="terminal-line">
                    <input id="commandInput" type="text" placeholder="> type a command..." autocomplete="off">
                </div>
            </div>
        </div>
    </div>

<script>
const input = document.getElementById("commandInput");
const terminal = document.getElementById("terminal");

input.addEventListener("keydown", function(event){
    if(event.key === "Enter"){
        const cmd = input.value.trim();
        input.value = "";

        // remove previous error if exists
        const prevError = terminal.querySelector(".error");
        if(prevError) prevError.remove();

        if(cmd === "experimental()"){
            window.open("pages/experimental.html", "_blank");
        } else if(cmd.length > 0) {
            const error = document.createElement("div");
            error.className = "error";
            error.textContent = `ERROR >> index.html line 206 >> "you thought i was actually going to make a working terminal?"`;
            terminal.appendChild(error);
        }
    }
});
</script>

</body>
</html>
